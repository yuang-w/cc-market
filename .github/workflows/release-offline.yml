name: Release Offline Package

on:
  push:
    tags:
      - 'v*'
      - 'latest'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: |
          # Extract version from plugin.json
          VERSION=$(grep '"version"' plugins/autogdb/plugin.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from plugin.json"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          cd plugins/autogdb/src
          make build-all

      - name: Assemble package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="autogdb-${VERSION}-Linux"

          mkdir -p "${PKG_DIR}/.claude-plugin"
          mkdir -p "${PKG_DIR}/plugins/autogdb"

          # Marketplace manifest
          cat > "${PKG_DIR}/.claude-plugin/marketplace.json" << EOF
          {
            "name": "autogdb-offline",
            "description": "autogdb offline installation package",
            "owner": {
              "name": "yuang-w"
            },
            "plugins": [
              {
                "name": "autogdb",
                "description": "GDB-based debugging MCP server with investigation skill",
                "version": "${VERSION}",
                "source": "./plugins/autogdb",
                "author": {
                  "name": "yuang-w"
                }
              }
            ]
          }
          EOF

          # Plugin files
          cp plugins/autogdb/plugin.json "${PKG_DIR}/plugins/autogdb/"
          cp plugins/autogdb/.mcp.json "${PKG_DIR}/plugins/autogdb/"
          cp -r plugins/autogdb/bin "${PKG_DIR}/plugins/autogdb/"
          cp -r plugins/autogdb/bridge "${PKG_DIR}/plugins/autogdb/"
          cp -r plugins/autogdb/skills "${PKG_DIR}/plugins/autogdb/"
          cp -r plugins/autogdb/hooks "${PKG_DIR}/plugins/autogdb/"

          # Install script and README
          cp plugins/autogdb/install.sh "${PKG_DIR}/"
          cp plugins/autogdb/README.txt "${PKG_DIR}/"

          # Create tar.gz
          tar -czvf "${PKG_DIR}.tar.gz" "${PKG_DIR}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: autogdb-*.tar.gz
          generate_release_notes: true
